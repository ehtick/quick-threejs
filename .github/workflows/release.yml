name: Releases

on:
  workflow_run:
    workflows: [Lint]
    branches: [master]
    types: [completed]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Workflow
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Cache turbo build setup
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.event.workflow_run.head_sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: "Install PNPM"
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js v${{ vars.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ vars.NODE_VERSION }}
          registry-url: https://registry.npmjs.org
          cache: "pnpm"

      - name: "Install Dependencies"
        shell: bash
        run: pnpm install --frozen-lockfile

      - name: Verify npm authentication
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm whoami

      - name: Build publishable packages
        run: pnpm build:packages

      - name: Create Release Pull Request & Release
        uses: changesets/action@v1
        with:
          commit: "chore(version): upgrade packages"
          title: "chore(version): upgrade packages"
          createGithubReleases: true
          publish: pnpm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
